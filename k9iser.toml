#
# k9iser manifest for session-sentinel
# Session health monitoring service — Deno-based stateful session watchdog with systemd integration

[project]
name = "session-sentinel"
safety_tier = "yard"

[[source]]
path = "deno.json"
type = "deno"
output = "generated/k9iser/deno-workspace.k9"

[[source]]
path = "Justfile"
type = "justfile"
output = "generated/k9iser/justfile-recipes.k9"

[[source]]
path = "Containerfile"
type = "containerfile"
output = "generated/k9iser/container-build.k9"

[[source]]
path = ".github/workflows/hypatia-scan.yml"
type = "workflow"
output = "generated/k9iser/ci-security.k9"

[[constraint]]
rule = "build.dependencies has no banned_packages"
severity = "error"

[[constraint]]
rule = "deno.imports has no npm: specifiers"
severity = "error"

[[constraint]]
rule = "container.base_image uses chainguard or distroless"
severity = "warn"
